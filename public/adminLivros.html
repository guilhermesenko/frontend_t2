<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gerenciar livros - Clube de Leitura</title>
  <link rel="stylesheet" href="css/estilo.css">
</head>
<body>
  <header>
    <h1>📚 Clube de Leitura</h1>
    <nav id="navegacao"></nav>
  </header>

  <main>
    <section>
      <h2>Gerenciar catálogo (admin)</h2>
      <p id="aviso" class="erro"></p>
      <ul id="lista-livros-admin"></ul>
    </section>

    <section class="cartao" id="area-form" hidden>
      <h3 id="titulo-form">Cadastrar livro</h3>
      <form id="form-livro">
        <input type="hidden" id="livro-id">

        <label for="titulo">Título</label>
        <input type="text" id="titulo" required>

        <label for="autor">Autor</label>
        <input type="text" id="autor" required>

        <label for="genero">Gênero</label>
        <input type="text" id="genero" required>

        <label for="ano">Ano</label>
        <input type="number" id="ano" required>

        <label for="descricao">Descrição</label>
        <textarea id="descricao" rows="3"></textarea>

        <div class="acoes-form">
          <button type="submit" id="botao-salvar">Cadastrar</button>
          <button type="button" id="botao-cancelar" class="secundario" hidden>Cancelar</button>
        </div>
        <p id="mensagem" class="erro"></p>
      </form>
    </section>
  </main>

  <footer>
    <p>INF1407 - PUC-Rio - <span id="ano-rodape"></span></p>
  </footer>

  <script type="module" src="javascript/adminLivros.js"></script>
</body>
</html>
